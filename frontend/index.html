<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>实时协同编辑器</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 20px;
    }
    header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    h1 { font-size: 18px; color: #333; }
    #status {
      font-size: 12px;
      padding: 3px 8px;
      border-radius: 12px;
      background: #ddd;
      color: #666;
    }
    #status.connected { background: #d4edda; color: #155724; }
    #status.disconnected { background: #f8d7da; color: #721c24; }
    #online-count {
      font-size: 12px;
      color: #888;
      margin-left: auto;
    }
    textarea {
      flex: 1;
      width: 100%;
      padding: 16px;
      font-size: 15px;
      line-height: 1.6;
      border: 1px solid #ddd;
      border-radius: 8px;
      resize: none;
      outline: none;
      background: #fff;
      color: #333;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: #666; }
    footer {
      margin-top: 8px;
      font-size: 11px;
      color: #aaa;
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <h1>📝 实时编辑器</h1>
    <span id="status" class="disconnected">连接中...</span>
    <span id="online-count"></span>
  </header>
  <textarea id="editor" placeholder="在这里输入文字，所有连接的人都能实时看到..."></textarea>
  <footer>多端实时同步 · 临时内容，关闭标签页后消失</footer>

  <!-- ⚠️ 部署后替换这里的后端地址 -->
  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  <script>
    // ⚠️ 部署 Railway 后，把下面的 URL 替换为你的 Railway 后端地址
    // 例如：const BACKEND_URL = 'https://your-app.up.railway.app';
    const BACKEND_URL = 'https://YOUR_RAILWAY_APP.up.railway.app';

    const editor = document.getElementById('editor');
    const statusEl = document.getElementById('status');
    const onlineEl = document.getElementById('online-count');

    const socket = io(BACKEND_URL, { transports: ['websocket', 'polling'] });
    let isRemoteUpdate = false;

    socket.on('connect', () => {
      statusEl.textContent = '已连接';
      statusEl.className = 'connected';
    });

    socket.on('disconnect', () => {
      statusEl.textContent = '已断开';
      statusEl.className = 'disconnected';
    });

    // 初始化内容
    socket.on('init', (content) => {
      isRemoteUpdate = true;
      editor.value = content;
      isRemoteUpdate = false;
    });

    // 收到其他人的更新
    socket.on('update', (content) => {
      const pos = editor.selectionStart;
      isRemoteUpdate = true;
      editor.value = content;
      isRemoteUpdate = false;
      // 尽量保持光标位置
      editor.setSelectionRange(pos, pos);
    });

    // 本地输入 → 发送给服务器
    editor.addEventListener('input', () => {
      if (!isRemoteUpdate) {
        socket.emit('edit', editor.value);
      }
    });
  </script>
</body>
</html>
