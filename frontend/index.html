<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>实时协同编辑器</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 20px;
    }
    header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    h1 { font-size: 18px; color: #333; }
    #room-label {
      font-size: 13px;
      padding: 3px 10px;
      border-radius: 12px;
      background: #e8e8e8;
      color: #555;
      font-family: monospace;
    }
    #crypto {
      font-size: 12px;
      padding: 3px 8px;
      border-radius: 12px;
      background: #e2e3f3;
      color: #3b3f72;
    }
    #copy-link {
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 12px;
      border: 1px solid #ccc;
      background: #fff;
      color: #444;
      cursor: pointer;
    }
    #copy-link:hover { background: #f0f0f0; }
    #status {
      font-size: 12px;
      padding: 3px 8px;
      border-radius: 12px;
      background: #ddd;
      color: #666;
      margin-left: auto;
    }
    #status.connected { background: #d4edda; color: #155724; }
    #status.disconnected { background: #f8d7da; color: #721c24; }
    #crypto-error {
      margin-bottom: 12px;
      padding: 10px 14px;
      border-radius: 8px;
      background: #f8d7da;
      color: #721c24;
      font-size: 13px;
      border: 1px solid #f5c2c7;
    }
    textarea {
      flex: 1;
      width: 100%;
      padding: 16px;
      font-size: 15px;
      line-height: 1.6;
      border: 1px solid #ddd;
      border-radius: 8px;
      resize: none;
      outline: none;
      background: #fff;
      color: #333;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: #666; }
    textarea:read-only { background: #f5f5f5; color: #999; }
    footer {
      margin-top: 8px;
      font-size: 11px;
      color: #aaa;
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <h1>📝 实时编辑器</h1>
    <span id="room-label"></span>
    <span id="crypto">🔒 E2EE</span>
    <button id="copy-link" type="button">复制链接</button>
    <span id="status" class="disconnected">连接中...</span>
  </header>
  <div id="crypto-error" hidden></div>
  <textarea id="editor" readonly placeholder="连接中..."></textarea>
  <footer>端到端加密 · 密钥在 URL 的 # 之后，不会传给服务器</footer>

  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  <script>
    const BACKEND_URL = 'https://backend-production-4603.up.railway.app';

    // 读取 URL 路径作为房间名，去掉开头的 /
    const room = (location.pathname.replace(/^\//, '') || 'default');
    document.getElementById('room-label').textContent = '/' + room;
    document.title = '编辑器 · /' + room;

    const editor = document.getElementById('editor');
    const statusEl = document.getElementById('status');
    const errorEl = document.getElementById('crypto-error');
    const copyBtn = document.getElementById('copy-link');

    // ---- base64url ----------------------------------------------------------
    function bytesToB64url(bytes) {
      let bin = '';
      for (const b of bytes) bin += String.fromCharCode(b);
      return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }
    function b64urlToBytes(s) {
      const pad = s.length % 4 === 0 ? '' : '='.repeat(4 - (s.length % 4));
      const bin = atob(s.replace(/-/g, '+').replace(/_/g, '/') + pad);
      const out = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
      return out;
    }

    // ---- 密钥管理 ------------------------------------------------------------
    // fragment 形如  #k=<43 字符 base64url>
    function parseKeyFromURL() {
      const m = location.hash.match(/(?:^|[#&])k=([A-Za-z0-9_-]+)/);
      if (!m) return null;
      const raw = b64urlToBytes(m[1]);
      if (raw.length !== 32) throw new Error('密钥长度错误');
      return raw;
    }

    function generateNewKey() {
      const raw = crypto.getRandomValues(new Uint8Array(32));
      history.replaceState(null, '', location.pathname + location.search + '#k=' + bytesToB64url(raw));
      return raw;
    }

    async function adoptKey(raw) {
      const key = await crypto.subtle.importKey('raw', raw, 'AES-GCM', false, ['encrypt', 'decrypt']);
      const fp = await fingerprint(raw);
      return { key, fp };
    }

    async function fingerprint(raw) {
      const hash = new Uint8Array(await crypto.subtle.digest('SHA-256', raw));
      return bytesToB64url(hash.slice(0, 4));
    }

    // 封包：<fp>.<iv>.<ct>
    async function encryptMsg(key, fp, plaintext) {
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const ct = new Uint8Array(await crypto.subtle.encrypt(
        { name: 'AES-GCM', iv },
        key,
        new TextEncoder().encode(plaintext)
      ));
      return fp + '.' + bytesToB64url(iv) + '.' + bytesToB64url(ct);
    }

    async function decryptMsg(key, fp, envelope) {
      const parts = envelope.split('.');
      if (parts.length !== 3) return null;
      if (parts[0] !== fp) return null;
      try {
        const iv = b64urlToBytes(parts[1]);
        const ct = b64urlToBytes(parts[2]);
        const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
        return new TextDecoder().decode(pt);
      } catch {
        return null;
      }
    }

    // ---- UI 状态 ------------------------------------------------------------
    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.hidden = false;
      editor.readOnly = true;
    }
    function clearError() {
      errorEl.hidden = true;
      editor.readOnly = false;
    }

    copyBtn.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(location.href);
        const old = copyBtn.textContent;
        copyBtn.textContent = '已复制';
        setTimeout(() => { copyBtn.textContent = old; }, 1200);
      } catch {
        prompt('请手动复制：', location.href);
      }
    });

    // ---- 启动 --------------------------------------------------------------
    // 密钥何时确定：
    //   - URL 带 fragment  → 启动时就 adopt，等 init 验证能否解密
    //   - URL 不带 fragment → 等服务器 init 告诉我们房间是否为空：
    //       空 → 我们是首访者，生成新密钥并写回 URL
    //       非空 → 该房间已有内容但我们没密钥，提示用户拿完整链接
    (async () => {
      let key = null, fp = null;

      try {
        const raw = parseKeyFromURL();
        if (raw) ({ key, fp } = await adoptKey(raw));
      } catch (e) {
        showError('URL 中的密钥格式错误：' + e.message);
        return;
      }

      const socket = io(BACKEND_URL, { transports: ['websocket', 'polling'] });
      let isRemoteUpdate = false;

      socket.on('connect', () => {
        statusEl.textContent = '已连接';
        statusEl.className = 'connected';
        socket.emit('join', room);
      });

      socket.on('disconnect', () => {
        statusEl.textContent = '已断开';
        statusEl.className = 'disconnected';
      });

      socket.on('init', async (envelope) => {
        if (!envelope) {
          // 房间为空
          if (!key) {
            // 没有密钥 + 房间空 = 我们是首访者，生成新密钥
            ({ key, fp } = await adoptKey(generateNewKey()));
          }
          clearError();
          isRemoteUpdate = true;
          editor.value = '';
          isRemoteUpdate = false;
          editor.placeholder = '在这里输入文字，所有连接的人都能实时看到...';
          return;
        }
        // 房间已有加密内容
        if (!key) {
          showError('该房间已有加密内容，但你的链接里没有密钥。请让已在房间的人把完整链接（包含 #k=... 部分）发给你，或换一个房间名（修改 URL 路径）开始新房间。');
          return;
        }
        const plaintext = await decryptMsg(key, fp, envelope);
        if (plaintext === null) {
          showError('无法解密当前房间内容：密钥不匹配。请确认链接完整，或让已在房间的人把链接发给你。');
          return;
        }
        clearError();
        isRemoteUpdate = true;
        editor.value = plaintext;
        isRemoteUpdate = false;
      });

      socket.on('update', async (envelope) => {
        if (!key) return;
        const plaintext = await decryptMsg(key, fp, envelope);
        if (plaintext === null) {
          showError('收到无法解密的消息：可能有人用了不同的密钥。');
          return;
        }
        clearError();
        const pos = editor.selectionStart;
        isRemoteUpdate = true;
        editor.value = plaintext;
        isRemoteUpdate = false;
        editor.setSelectionRange(pos, pos);
      });

      editor.addEventListener('input', async () => {
        if (isRemoteUpdate || !key) return;
        const envelope = await encryptMsg(key, fp, editor.value);
        socket.emit('edit', envelope);
      });
    })();
  </script>
</body>
</html>
