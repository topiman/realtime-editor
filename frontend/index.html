<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>实时协同编辑器</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 20px;
    }
    header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    h1 { font-size: 18px; color: #333; }
    #room-label {
      font-size: 13px;
      padding: 3px 10px;
      border-radius: 12px;
      background: #e8e8e8;
      color: #555;
      font-family: monospace;
    }
    #status {
      font-size: 12px;
      padding: 3px 8px;
      border-radius: 12px;
      background: #ddd;
      color: #666;
      margin-left: auto;
    }
    #status.connected { background: #d4edda; color: #155724; }
    #status.disconnected { background: #f8d7da; color: #721c24; }
    textarea {
      flex: 1;
      width: 100%;
      padding: 16px;
      font-size: 15px;
      line-height: 1.6;
      border: 1px solid #ddd;
      border-radius: 8px;
      resize: none;
      outline: none;
      background: #fff;
      color: #333;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: #666; }
    footer {
      margin-top: 8px;
      font-size: 11px;
      color: #aaa;
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <h1>📝 实时编辑器</h1>
    <span id="room-label"></span>
    <span id="status" class="disconnected">连接中...</span>
  </header>
  <textarea id="editor" placeholder="在这里输入文字，所有连接的人都能实时看到..."></textarea>
  <footer>多端实时同步 · 不同 URL 后缀对应不同文档</footer>

  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  <script>
    const BACKEND_URL = 'https://backend-production-4603.up.railway.app';

    // 读取 URL 路径作为房间名，去掉开头的 /
    const room = (location.pathname.replace(/^\//, '') || 'default');
    document.getElementById('room-label').textContent = '/' + room;
    document.title = '编辑器 · /' + room;

    const editor = document.getElementById('editor');
    const statusEl = document.getElementById('status');

    const socket = io(BACKEND_URL, { transports: ['websocket', 'polling'] });
    let isRemoteUpdate = false;

    socket.on('connect', () => {
      statusEl.textContent = '已连接';
      statusEl.className = 'connected';
      socket.emit('join', room);
    });

    socket.on('disconnect', () => {
      statusEl.textContent = '已断开';
      statusEl.className = 'disconnected';
    });

    socket.on('init', (content) => {
      isRemoteUpdate = true;
      editor.value = content;
      isRemoteUpdate = false;
    });

    socket.on('update', (content) => {
      const pos = editor.selectionStart;
      isRemoteUpdate = true;
      editor.value = content;
      isRemoteUpdate = false;
      editor.setSelectionRange(pos, pos);
    });

    editor.addEventListener('input', () => {
      if (!isRemoteUpdate) {
        socket.emit('edit', editor.value);
      }
    });
  </script>
</body>
</html>
